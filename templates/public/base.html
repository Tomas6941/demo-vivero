<nav class="navbar">
  <div class="navbar-container">

    <a href="/" class="logo">
      <img src="/static/img/public/logo.jpg" alt="logo">
      <span>Vivero Biotecnológico</span>
    </a>

    <div class="navbar-links" id="navbarLinks">
      <ul>
        <li><a href="/">Inicio</a></li>
        <li><a href="/informacion">Información</a></li>
      </ul>
    </div>

    <div class="navbar-right">
      <button class="btn-start" onclick="window.location.href='/login'">
        Iniciar Sesión
      </button>
      <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>

  <!-- Menú desplegable móvil -->
  <div class="navbar-mobile-menu" id="mobileMenu">
    <a href="/">Inicio</a>
    <a href="/informacion">Información</a>
    <a href="/contacto">Contacto</a>
    <a href="/login" class="mobile-login-btn">Iniciar Sesión</a>
  </div>
</nav>

<script>
  (function() {
    const btn  = document.getElementById('menuBtn');
    const menu = document.getElementById('mobileMenu');
    if (!btn || !menu) return;
    btn.addEventListener('click', function() {
      const open = menu.classList.toggle('open');
      btn.classList.toggle('open', open);
    });
    // Cerrar al tocar un link
    menu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        menu.classList.remove('open');
        btn.classList.remove('open');
      });
    });
  })();
</script>

<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Mi App{% endblock %}</title>

    <link rel="preload" href="{{ url_for('static', filename='css/public/app.css') }}" as="style">
    <link rel="preload" href="{{ url_for('static', filename='css/public/navbar.css') }}" as="style">


    <link rel="stylesheet" href="{{ url_for('static', filename='css/public/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/public/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/public/login.css') }}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block page_css %}{% endblock %}
</head>

<body class="layout">

    {% include "public/base.html" %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</html>

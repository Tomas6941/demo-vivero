<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/private/navbar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/private/app.css') }}">
  {% block page_css %}{% endblock %}
</head>
<body>

  <div class="dash-layout">
    {% include "private/navbar.html" %}

    <div class="dash-main" id="dashMain">
      {% block content %}{% endblock %}
    </div>
  </div>

  <!-- JS al final del body, después del DOM -->
  <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
</body>
</html>
